<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar Monitor - Casanova Ultimate</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* RESET E STRUTTURA BASE MOBILE */
    body { margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; color: #1c1e21; }
    .app { max-width: 420px; margin: 0 auto; padding: 8px; }

    /* HEADER COMPATTO */
    .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; padding: 0 4px; }
    .app-title { font-size: 16px; font-weight: 800; margin: 0; }
    .app-subtitle { font-size: 10px; color: #65676b; }
    .badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #e7f3ff; color: #1877f2; font-weight: 700; }

    /* GRIGLIA GAUGE COMPATTI */
    .gauges { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 8px; }
    .gauge-card { background: #fff; border-radius: 12px; padding: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); text-align: center; }
    .gauge-label { font-size: 9px; font-weight: 700; text-transform: uppercase; color: #8a8d91; margin-bottom: 6px; }
    .gauge-wrap { display: flex; justify-content: center; }
    .gauge { 
      --value: 0; --bg: #f0f2f5; --fg: #1877f2; 
      width: 80px; height: 80px; border-radius: 50%; 
      display: flex; align-items: center; justify-content: center;
      background: conic-gradient(var(--fg) calc(var(--value) * 1%), var(--bg) 0);
      position: relative;
    }
    .gauge::before { content: ''; position: absolute; inset: 10px; border-radius: 50%; background: #fff; }
    .gauge-inner { position: relative; }
    .gauge-value { font-size: 16px; font-weight: 800; display: block; line-height: 1; }
    .gauge-unit { font-size: 9px; color: #65676b; }
    
    /* COLORI CATEGORIE GAUGE */
    .gauge-power { --fg: #8e44ad; }
    .gauge-energy { --fg: #27ae60; }
    .gauge-voltage { --fg: #e67e22; }
    .gauge-vmp { --fg: #d35400; }

    /* RIQUADRO SEPARATO: METEO E AMBIENTE CON ICONE */
    .env-card { background: #fff; border-radius: 12px; padding: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); margin-bottom: 8px; }
    .env-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; text-align: center; }
    .env-item { background: #f8f9fa; padding: 6px 4px; border-radius: 8px; border: 1px solid #f0f2f5; }
    .env-icon { font-size: 16px; margin-bottom: 2px; display: block; }
    .env-label { font-size: 8px; font-weight: 700; text-transform: uppercase; color: #8a8d91; display: block; margin-bottom: 2px; }
    .env-value { font-size: 11px; font-weight: 700; color: #1c1e21; }

    /* SLIDER CARD */
    .slider-card { background: #fff; border-radius: 12px; padding: 8px 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); margin-bottom: 8px; border: 1px dashed #d35400; }
    .slider-header { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; font-weight: 600; }
    .slider-value { color: #d35400; font-weight: 700; }
    .range-input { width: 100%; accent-color: #d35400; height: 4px; margin: 4px 0; cursor: pointer; }
    .note { font-size: 9px; color: #8a8d91; line-height: 1.2; text-align: center; font-style: italic; margin-top: 2px; }

    /* RIQUADRO SEPARATO: CORRENTE LIVE (AMP-METER) */
    .current-card { background: #fff; border-radius: 12px; padding: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); margin-bottom: 8px; border-left: 4px solid #117a65; }
    .current-highlight-box { background: #e8f8f5; border: 1px solid #a3e4d7; border-radius: 8px; padding: 8px 10px; }
    .current-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .current-title { font-size: 10px; font-weight: 700; color: #16a085; text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; }
    .current-value { font-size: 16px; font-weight: 800; color: #117a65; }
    .current-bar-bg { width: 100%; height: 6px; background: #d1f2eb; border-radius: 3px; overflow: hidden; }
    .current-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #1abc9c, #117a65); transition: width 0.15s ease; }
    
    /* LED PULSANTE */
    .pulse-dot { width: 6px; height: 6px; background-color: #1abc9c; border-radius: 50%; margin-right: 6px; display: inline-block; animation: pulse 1.6s infinite; }
    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 0.6; box-shadow: 0 0 0 0 rgba(26,188,156,0.5); }
      70% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 0 5px rgba(26,188,156,0); }
      100% { transform: scale(0.9); opacity: 0.6; box-shadow: 0 0 0 0 rgba(26,188,156,0); }
    }

    /* GRAFICO */
    .chart-card { background: #fff; border-radius: 12px; padding: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .chart-box { height: 180px; }
  </style>
</head>
<body>
  <div class="app">
    
    <!-- HEADER -->
    <div class="app-header">
      <div>
        <h1 class="app-title">PV Monitoring</h1>
        <div class="app-subtitle">Ist. Casanova • Mobile Edition</div>
      </div>
      <div class="badge" id="wifiBadge">TS CONNECTING</div>
    </div>
    
    <!-- QUADRANTI GAUGE COMPATTI -->
    <div class="gauges">
      <div class="gauge-card">
        <div class="gauge-label">Power</div>
        <div class="gauge-wrap">
          <div class="gauge gauge-power" id="gPower"><div class="gauge-inner"><span class="gauge-value" id="powerVal">--</span><span class="gauge-unit">W</span></div></div>
        </div>
      </div>
      <div class="gauge-card">
        <div class="gauge-label">Energy</div>
        <div class="gauge-wrap">
          <div class="gauge gauge-energy" id="gEnergy"><div class="gauge-inner"><span class="gauge-value" id="energyVal">--</span><span class="gauge-unit">Wh</span></div></div>
        </div>
      </div>
      <div class="gauge-card">
        <div class="gauge-label">Voc</div>
        <div class="gauge-wrap">
          <div class="gauge gauge-voltage" id="gVoc"><div class="gauge-inner"><span class="gauge-value" id="vocVal">--</span><span class="gauge-unit">V</span></div></div>
        </div>
      </div>
      <div class="gauge-card">
        <div class="gauge-label">Vmp (Stim)</div>
        <div class="gauge-wrap">
          <div class="gauge gauge-vmp" id="gVmp"><div class="gauge-inner"><span class="gauge-value" id="vmpVal">--</span><span class="gauge-unit">V</span></div></div>
        </div>
      </div>
    </div>

    <!-- RIQUADRO AMBIENTE E METEO CON ICONE -->
    <div class="env-card">
      <div class="env-grid">
        <div class="env-item">
          <span class="env-icon">🌡️</span>
          <span class="env-label">Temp</span>
          <span id="tempTxt" class="env-value">-- °C</span>
        </div>
        <div class="env-item">
          <span class="env-icon">💧</span>
          <span class="env-label">Umidità</span>
          <span id="humTxt" class="env-value">-- %</span>
        </div>
        <div class="env-item">
          <span class="env-icon">☀️</span>
          <span class="env-label">Irragg.</span>
          <span id="irrTxt" class="env-value">-- %</span>
        </div>
      </div>
    </div>

    <!-- SLIDER CARICO VARIABILE -->
    <div class="slider-card">
      <div class="slider-header">
        <span>Regolazione Carico Resistivo</span>
        <span id="rVal" class="slider-value">10.0 Ω</span>
      </div>
      <input type="range" id="rSlider" min="1.0" max="50.0" step="0.5" value="10.0" class="range-input">
      <div class="note">Modificando la resistenza variano istantaneamente i dati storici e correnti.</div>
    </div>

    <!-- RIQUADRO CORRENTE LIVE (SPOSTATO SOTTO LO SLIDER) -->
    <div class="current-card">
      <div class="current-highlight-box">
        <div class="current-header">
          <span class="current-title"><span class="pulse-dot"></span>Corrente Simulata</span>
          <span id="currTxt" class="current-value">-- A</span>
        </div>
        <div class="current-bar-bg">
          <div id="currBar" class="current-bar-fill"></div>
        </div>
      </div>
    </div>

    <!-- GRAFICO COMPLETO -->
    <div class="chart-card">
      <div class="chart-box"><canvas id="powerChart"></canvas></div>
    </div>

    <script>
      let currentREquiv = 10.0;
      let globalFeeds = [];

      function setGauge(id, val, min, max) {
        let el = document.getElementById(id);
        if(!el) return;
        let v = Math.max(min, Math.min(max, val || 0));
        let perc = ((v - min) / (max - min)) * 100;
        el.style.setProperty('--value', perc);
      }

      // Configurazione del grafico
      let ctx = document.getElementById('powerChart').getContext('2d');
      let powerChart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [
          { label: 'Potenza (W)', data: [], borderColor: '#8e44ad', borderWidth: 1.5, tension: 0.2, pointRadius: 0, yAxisID: 'y' },
          { label: 'Vmp (V)', data: [], borderColor: '#d35400', borderWidth: 1.5, tension: 0.2, pointRadius: 0, yAxisID: 'y' },
          { label: 'Voc (V)', data: [], borderColor: '#e67e22', borderWidth: 1.2, borderDash: [2, 2], tension: 0.2, pointRadius: 0, yAxisID: 'y' },
          { label: 'Corrente (A)', data: [], borderColor: '#1abc9c', borderWidth: 1.5, tension: 0.2, pointRadius: 0, yAxisID: 'yI' },
          { label: 'Irragg. (%)', data: [], borderColor: '#f1c40f', borderWidth: 1, borderDash: [3, 3], tension: 0.2, pointRadius: 0, yAxisID: 'yEnv' },
          { label: 'Temp (°C)', data: [], borderColor: '#e74c3c', borderWidth: 1, tension: 0.2, pointRadius: 0, yAxisID: 'yEnv' }
        ]},
        options: { 
          responsive: true, 
          maintainAspectRatio: false, 
          plugins: { legend: { labels: { boxWidth: 6, font: { size: 7.5 } } } }, 
          scales: { 
            x: { display: false }, 
            y: { position: 'left', ticks: { font: { size: 8 } }, title: { display: false } },
            yI: { position: 'right', grid: { drawOnChartArea: false }, ticks: { font: { size: 8 } } },
            yEnv: { display: false }
          } 
        }
      });

      function processAndRenderData() {
        if (!globalFeeds.length) return;
        let labels = [], pArr = [], vmpArr = [], vocArr = [], cArr = [], irrArr = [], tArr = [];

        globalFeeds.forEach(f => {
          let timeStr = new Date(f.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          let vmp = parseFloat(f.field4) || 0;
          let voc = parseFloat(f.field3) || 0;
          let irr = parseFloat(f.field2) || 0;
          let temp = parseFloat(f.field1) || 0;
          
          labels.push(timeStr);
          vmpArr.push(vmp);
          vocArr.push(voc);
          pArr.push((vmp * vmp) / currentREquiv);
          cArr.push(vmp / currentREquiv);
          irrArr.push(irr);
          tArr.push(temp);
        });

        // Caricamento simultaneo di tutte le grandezze nel grafico
        powerChart.data.labels = labels;
        powerChart.data.datasets[0].data = pArr;
        powerChart.data.datasets[1].data = vmpArr;
        powerChart.data.datasets[2].data = vocArr;
        powerChart.data.datasets[3].data = cArr;
        powerChart.data.datasets[4].data = irrArr;
        powerChart.data.datasets[5].data = tArr;
        powerChart.update('none');

        const last = globalFeeds[globalFeeds.length - 1];
        const vmp = parseFloat(last.field4) || 0;
        const voc = parseFloat(last.field3) || 0;
        const tsE = parseFloat(last.field7) || 0;
        
        const calculatedAmp = vmp / currentREquiv;
        
        // Quadranti Gauge
        document.getElementById('powerVal').textContent = ((vmp * vmp) / currentREquiv).toFixed(1);
        document.getElementById('energyVal').textContent = (tsE * (10.0 / currentREquiv)).toFixed(1);
        document.getElementById('vocVal').textContent = voc.toFixed(1);
        document.getElementById('vmpVal').textContent = vmp.toFixed(1);
        
        // Riquadro della Corrente
        document.getElementById('currTxt').textContent = calculatedAmp.toFixed(2) + " A";
        let barWidthPercent = Math.min(100, (calculatedAmp / 20.0) * 100);
        document.getElementById('currBar').style.width = barWidthPercent + "%";
        
        // Riquadro Ambiente con Icone Grafiche
        document.getElementById('tempTxt').textContent = (parseFloat(last.field1) || 0).toFixed(1) + " °C";
        document.getElementById('humTxt').textContent = (parseFloat(last.field8) || 0).toFixed(0) + " %";
        document.getElementById('irrTxt').textContent = (parseFloat(last.field2) || 0).toFixed(0) + " %";

        setGauge('gPower', (vmp*vmp)/currentREquiv, 0, 200);
        setGauge('gEnergy', tsE*(10/currentREquiv), 0, 500);
        setGauge('gVoc', voc, 0, 25);
        setGauge('gVmp', vmp, 0, 25);
      }

      async function updateData() {
        try {
          const r = await fetch('https://api.thingspeak.com/channels/3397574/feeds.json?results=15');
          const d = await r.json();
          globalFeeds = d.feeds;
          processAndRenderData();
          document.getElementById('wifiBadge').textContent = 'LIVE';
          document.getElementById('wifiBadge').style.color = '#27ae60';
        } catch (e) {
          document.getElementById('wifiBadge').textContent = 'ERR';
          document.getElementById('wifiBadge').style.color = '#e74c3c';
        }
      }

      document.getElementById('rSlider').addEventListener('input', (e) => {
        currentREquiv = parseFloat(e.target.value);
        document.getElementById('rVal').textContent = currentREquiv.toFixed(1) + ' Ω';
        processAndRenderData();
      });

      setInterval(updateData, 15000);
      updateData();
    </script>
  </div>
</body>
</html>
